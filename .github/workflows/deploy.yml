name: Build and Deploy Blog

on:
  push:
    branches:
      - source
      - claude/obsidian-blog-github-pages-llRxh
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PaperMod theme (fallback if submodule empty)
        run: |
          if [ ! -f "themes/PaperMod/theme.toml" ]; then
            git clone --depth=1 https://github.com/adityatelange/hugo-PaperMod themes/PaperMod
          fi

      - name: Convert Obsidian vault to Hugo content
        run: python3 scripts/obsidian_to_hugo.py

      - name: Build Hugo site
        run: hugo --minify

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
